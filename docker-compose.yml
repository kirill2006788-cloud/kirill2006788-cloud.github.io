services:
  api:
    build: ./backend_vps/api
    image: prosto-taxi-api
    container_name: prosto_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - SMS_PROVIDER=smsaero
      - SMSAERO_EMAIL=${SMSAERO_EMAIL}
      - SMSAERO_API_KEY=${SMSAERO_API_KEY}
      - SMSAERO_USE_HTTP=1
      - SMSC_LOGIN=${SMSC_LOGIN}
      - SMSC_PASSWORD=${SMSC_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_EXPIRES_IN=${ADMIN_JWT_EXPIRES_IN:-12h}
      - ADMIN_LOGIN=${ADMIN_LOGIN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_IP_ALLOWLIST=${ADMIN_IP_ALLOWLIST:-}
      - OTP_DEBUG_LOG=${OTP_DEBUG_LOG:-0}
      - OTP_TTL_SEC=${OTP_TTL_SEC:-300}
      - OTP_COOLDOWN_SEC=${OTP_COOLDOWN_SEC:-60}
      - OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS:-5}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - BODY_LIMIT=50mb

  redis:
    image: redis:7-alpine
    container_name: prosto_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: prosto_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./prosto_taxi_driver/android/admin.html:/usr/share/nginx/html/index.html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/messenger:/var/www/messenger:ro
    depends_on:
      - api

volumes:
  redis_data:
