# Конфиг для api.trezv7777.ru
# Скопировать на VPS: /etc/nginx/sites-available/api.trezv7777.ru
# Порт 3254 — замените на свой, если бэкенд слушает другой (например 3000).

server {
    listen 80;
    server_name api.trezv7777.ru;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3254;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
